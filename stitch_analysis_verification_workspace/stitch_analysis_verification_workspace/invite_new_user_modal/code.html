<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Invite New User Modal - RAVEN</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f72ad",
                        "background-light": "#fafafa",
                        "background-dark": "#22252a",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #dce1e5;
            border-radius: 10px;
        }
        .modal-overlay {
            background: rgba(18, 21, 23, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#121517] dark:text-white min-h-screen">
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
<!-- Modal Container -->
<div class="bg-white dark:bg-[#1a1d21] w-full max-w-[720px] max-h-[90vh] flex flex-col rounded shadow-2xl overflow-hidden border border-[#dce1e5] dark:border-[#3a4149]">
<!-- Modal Header -->
<div class="flex items-center justify-between p-6 border-b border-[#dce1e5] dark:border-[#3a4149]">
<div class="flex flex-col gap-1">
<h2 class="text-2xl font-bold leading-tight tracking-tight">Invite New Personnel</h2>
<p class="text-[#657886] dark:text-[#a1aeb7] text-sm">Add a new member to the RAVEN system to manage and verify radiology reports.</p>
</div>
<button class="p-2 hover:bg-[#f0f2f4] dark:hover:bg-[#2c3238] rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Modal Content Scrollable Area -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
<!-- Personal Details Section -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#121517] dark:text-[#f0f2f4]">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#657886] text-xl group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-11 pr-4 py-3 border border-[#dce1e5] dark:border-[#3a4149] rounded bg-white dark:bg-[#22252a] focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-[#657886]/50" placeholder="Dr. Sarah Connor" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#121517] dark:text-[#f0f2f4]">Institutional Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#657886] text-xl group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-11 pr-4 py-3 border border-[#dce1e5] dark:border-[#3a4149] rounded bg-white dark:bg-[#22252a] focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-[#657886]/50" placeholder="s.connor@hospital.org" type="email"/>
</div>
</div>
</section>
<!-- Professional Context Section -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#121517] dark:text-[#f0f2f4]">Primary Department</label>
<div class="relative">
<select class="w-full px-4 py-3 border border-[#dce1e5] dark:border-[#3a4149] rounded bg-white dark:bg-[#22252a] focus:ring-1 focus:ring-primary focus:border-primary outline-none appearance-none cursor-pointer">
<option disabled="" selected="" value="">Select department</option>
<option value="radiology">Radiology</option>
<option value="oncology">Oncology</option>
<option value="emergency">Emergency Medicine</option>
<option value="cardiology">Cardiology</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[#657886] pointer-events-none">unfold_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-[#121517] dark:text-[#f0f2f4]">Assigned Facilities</label>
<div class="flex flex-wrap items-center gap-2 p-2 border border-[#dce1e5] dark:border-[#3a4149] rounded bg-white dark:bg-[#22252a] min-h-[50px]">
<span class="flex items-center gap-1 bg-primary/10 text-primary px-2 py-1 rounded text-xs font-bold">
                                General Hosp.
                                <span class="material-symbols-outlined text-sm cursor-pointer">close</span>
</span>
<span class="flex items-center gap-1 bg-primary/10 text-primary px-2 py-1 rounded text-xs font-bold">
                                West Clinic
                                <span class="material-symbols-outlined text-sm cursor-pointer">close</span>
</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-1 placeholder:text-[#657886]/50" placeholder="Add facility..." type="text"/>
</div>
</div>
</section>
<!-- Role Selection Section -->
<section>
<h3 class="text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">verified_user</span>
                        Role Selection
                    </h3>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Admin Card -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="role" type="radio"/>
<div class="p-4 border border-[#dce1e5] dark:border-[#3a4149] rounded group-hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all flex flex-col gap-2 h-full">
<div class="flex justify-between items-start">
<span class="text-sm font-bold">Admin</span>
<span class="material-symbols-outlined text-primary scale-0 peer-checked:scale-100 transition-transform">check_circle</span>
</div>
<p class="text-xs text-[#657886] dark:text-[#a1aeb7] leading-relaxed">Full system configuration, user management, and audit log access.</p>
</div>
</label>
<!-- Radiologist Card -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="role" type="radio"/>
<div class="p-4 border border-[#dce1e5] dark:border-[#3a4149] rounded group-hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all flex flex-col gap-2 h-full">
<div class="flex justify-between items-start">
<span class="text-sm font-bold">Radiologist</span>
<span class="material-symbols-outlined text-primary scale-0 peer-checked:scale-100 transition-transform">check_circle</span>
</div>
<p class="text-xs text-[#657886] dark:text-[#a1aeb7] leading-relaxed">Full report verification, AI diagnostic tools, and final signing authority.</p>
</div>
</label>
<!-- Resident Card -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="role" type="radio"/>
<div class="p-4 border border-[#dce1e5] dark:border-[#3a4149] rounded group-hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all flex flex-col gap-2 h-full">
<div class="flex justify-between items-start">
<span class="text-sm font-bold">Resident</span>
<span class="material-symbols-outlined text-primary scale-0 peer-checked:scale-100 transition-transform">check_circle</span>
</div>
<p class="text-xs text-[#657886] dark:text-[#a1aeb7] leading-relaxed">Report drafting, review-only access to verification tools. Requires approval.</p>
</div>
</label>
<!-- Researcher Card -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="role" type="radio"/>
<div class="p-4 border border-[#dce1e5] dark:border-[#3a4149] rounded group-hover:border-primary/50 peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all flex flex-col gap-2 h-full">
<div class="flex justify-between items-start">
<span class="text-sm font-bold">Researcher</span>
<span class="material-symbols-outlined text-primary scale-0 peer-checked:scale-100 transition-transform">check_circle</span>
</div>
<p class="text-xs text-[#657886] dark:text-[#a1aeb7] leading-relaxed">De-identified data access and export tools for clinical studies.</p>
</div>
</label>
</div>
</section>
</div>
<!-- Modal Footer -->
<div class="flex items-center justify-end gap-3 p-6 border-t border-[#dce1e5] dark:border-[#3a4149] bg-background-light dark:bg-[#1a1d21]">
<button class="px-6 py-2.5 rounded text-sm font-bold text-[#657886] hover:bg-[#dce1e5] dark:hover:bg-[#3a4149] transition-colors">
                    Cancel
                </button>
<button class="px-8 py-2.5 rounded bg-primary text-white text-sm font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg">send</span>
                    Send Invitation
                </button>
</div>
</div>
</div>
<!-- Background Content Placeholder -->
<div class="p-10 opacity-30 pointer-events-none">
<nav class="flex justify-between mb-12">
<div class="h-8 w-32 bg-gray-300 dark:bg-gray-700 rounded"></div>
<div class="flex gap-4">
<div class="h-8 w-8 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
<div class="h-8 w-8 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
</div>
</nav>
<div class="grid grid-cols-3 gap-8">
<div class="col-span-2 space-y-6">
<div class="h-48 w-full bg-gray-200 dark:bg-gray-800 rounded-xl"></div>
<div class="h-96 w-full bg-gray-200 dark:bg-gray-800 rounded-xl"></div>
</div>
<div class="space-y-6">
<div class="h-64 w-full bg-gray-200 dark:bg-gray-800 rounded-xl"></div>
<div class="h-64 w-full bg-gray-200 dark:bg-gray-800 rounded-xl"></div>
</div>
</div>
</div>
</body></html>
