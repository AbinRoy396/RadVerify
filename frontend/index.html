<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stitch Demo | Frontend Only</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300..700" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="sidebar__top">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">
            <span class="material-symbols-outlined">clinical_notes</span>
          </div>
          <div class="brand__text">
            <div class="brand__name">RAVEN AI</div>
            <div class="brand__sub">Radiology Verification</div>
          </div>
        </div>

        <nav id="nav" class="nav"></nav>
      </div>

      <div class="sidebar__bottom">
        <div class="status-card">
          <div class="status-card__label">DEMO MODE</div>
          <div class="status-card__value">Offline · Mock data</div>
        </div>

        <button id="openSignIn" class="user" type="button">
          <div class="user__avatar" aria-hidden="true">RV</div>
          <div class="user__meta">
            <div id="userName" class="user__name">RAVEN Operator</div>
            <div id="userRole" class="user__role">Clinical Reviewer</div>
          </div>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar__left">
          <button id="sidebarToggle" class="icon-btn hamburger" type="button" aria-label="Open navigation">
            <span class="material-symbols-outlined" aria-hidden="true">menu</span>
          </button>
          <div class="topbar__title">
            <div id="pageTitle" class="topbar__h">Upload Portal</div>
            <div id="pageSub" class="topbar__sub"></div>
          </div>
        </div>
        <div class="topbar__actions">
          <div id="statusPill" class="pill" hidden></div>
          <button id="newAnalysisBtn" class="btn btn--primary" type="button">
            <span class="material-symbols-outlined" aria-hidden="true">add</span>
            New Analysis
          </button>
        </div>
      </header>

      <section id="view" class="view" aria-live="polite"></section>
    </main>
  </div>

  <div id="backdrop" class="backdrop" hidden></div>

  <div id="modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__panel">
      <div class="modal__header">
        <div id="modalTitle" class="modal__title"></div>
        <button id="modalClose" class="icon-btn" type="button" aria-label="Close">
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
      </div>
      <div id="modalBody" class="modal__body"></div>
      <div id="modalFooter" class="modal__footer"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
